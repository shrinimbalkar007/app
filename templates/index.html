<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tomato Leaf Disease Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }
        #upload-area {
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 10px;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Tomato Leaf Disease Classifier</h1>
    <p>Upload an image of a tomato leaf to predict its disease status.</p>

    <div id="upload-area">
        <input type="file" id="image" accept="image/*">
        <br><br>
        <button onclick="upload()">Predict</button>
    </div>

    <div id="result"></div>

    <script>
        async function upload() {
            const input = document.getElementById("image");
            const file = input.files[0];

            if (!file) {
                alert("Please select an image file.");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);

            const res = await fetch("/predict", {
                method: "POST",
                body: formData
            });

            const data = await res.json();

            const resultDiv = document.getElementById("result");

            if (res.ok && data.class) {
                resultDiv.innerHTML = `
                    <p><strong>Prediction:</strong> ${data.class}</p>
                    <p><strong>Confidence:</strong> ${data.confidence.toFixed(3)}</p>
                `;
            } else {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${data.error || "Unknown error"}</p>`;
            }
        }
    </script>
</body>
</html>
